name: CI CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build with Maven
        run: mvn clean package -DskipTests

      - name: Login to Docker Hub
        # Using CLI directly — more reliable than the action when secrets are not
        # being forwarded correctly (shows up as only "logout: true" in action logs)
        run: echo "dckr_pat_ei-ANr1Yji6KBKaLwSn4h5pkRjQ" | docker login -u "rambabuadabala" --password-stdin

      - name: Build Docker image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/spring-boot:latest .

      - name: Push Docker image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/spring-boot:latest

      - name: Deploy on AWS server
        uses: appleboy/ssh-action@v1.0.3      # ✅ pinned version instead of @master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |                           # ✅ multiline script requires pipe (|)
            sudo docker stop myapp || true
            sudo docker rm myapp || true
            sudo docker pull ${{ secrets.DOCKER_USERNAME }}/spring-boot:latest
            sudo docker run -d -p 8080:8080 --name myapp ${{ secrets.DOCKER_USERNAME }}/spring-boot:latest
