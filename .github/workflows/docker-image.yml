name: CI CD pipeline 

on:
  push:
    branches: [ "main" ]

jobs:

  build-and-deploy:

    runs-on: ubuntu-latest

    steps:
    - name: checkout code
      uses: actions/checkout@v3
    - name: Setup Java
      uses: actions/setup-java@v3
      with:
        java-version: '21'
        distribution: 'temurin'
    - name: Build with maven
      run: mvn clean package -DskipTests
    - name: Login Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{secrets.DOCKER_USERNAME}}
        password: ${{secrets.DOCKER_PASSWORD}}
    - name: Build docker image
      run: docker build -t ${{secrets.DOCKER_USERNAME}}/spring-boot:latest .
    - name: push docker image
      run: docker push ${{secrets.DOCKER_USERNAME}}/spring-boot:latest 
    - name: Deploy on aws server
      uses: appleboy/ssh-action@master
      with:
        host: ${{secrets.EC2_HOST}}
        username: ${{secrets.EC2_USERNAME}}
        key: ${{secrets.EC2_SSH_KEY}}
        script: 
          sudo docker stop myapp || true
          sudo docker rm myapp || true
          sudo docker pull ${{ secrets.DOCKER_USERNAME }}/spring-boot:latest
          sudo docker run -d  -p 8080:8080 --name myapp  ${{ secrets.DOCKER_USERNAME }}/spring-boot:latest
        
